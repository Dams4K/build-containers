name: Build and Push Godot containers

on:
  push:
    branches: [main]

env:
  IMG_VERSION: 4.6-f43

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set lowercase owner
        run: echo "OWNER=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build base
        run: |
          docker build \
            -t ghcr.io/${{ env.OWNER }}/godot-fedora:${{ env.IMG_VERSION }} \
            -f Dockerfile.base \
            .
          docker push ghcr.io/${{ env.OWNER }}/godot-fedora:${{ env.IMG_VERSION }}
          docker tag ghcr.io/${{ env.OWNER }}/godot-fedora:${{ env.IMG_VERSION }} godot-fedora:${{ env.IMG_VERSION }}

      - name: Build linux
        run: |
          docker build \
            --build-arg img_version=${{ env.IMG_VERSION }} \
            -t ghcr.io/${{ env.OWNER }}/godot-linux:${{ env.IMG_VERSION }} \
            -f Dockerfile.linux \
            .
          docker push ghcr.io/${{ env.OWNER }}/godot-linux:${{ env.IMG_VERSION }}

      - name: Build windows
        run: |
          docker build \
            --build-arg img_version=${{ env.IMG_VERSION }} \
            -t ghcr.io/${{ env.OWNER }}/godot-windows:${{ env.IMG_VERSION }} \
            -f Dockerfile.windows \
            .
          docker push ghcr.io/${{ env.OWNER }}/godot-windows:${{ env.IMG_VERSION }}

      - name: Build web
        run: |
          docker build \
            --build-arg img_version=${{ env.IMG_VERSION }} \
            -t ghcr.io/${{ env.OWNER }}/godot-web:${{ env.IMG_VERSION }} \
            -f Dockerfile.web \
            .
          docker push ghcr.io/${{ env.OWNER }}/godot-web:${{ env.IMG_VERSION }}

      - name: Build android
        run: |
          docker build \
            --build-arg img_version=${{ env.IMG_VERSION }} \
            -t ghcr.io/${{ env.OWNER }}/godot-android:${{ env.IMG_VERSION }} \
            -f Dockerfile.android \
            .
          docker push ghcr.io/${{ env.OWNER }}/godot-android:${{ env.IMG_VERSION }}